<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tiro</title>
</head>
<body style="background:#2D3436;color:white;text-align:center;padding:20px">
<h1>🎯 Analizador de Tiro</h1>
<p>✅ App funcionando</p>
<video id="video" autoplay playsinline style="width:100%;max-width:400px;border-radius:10px"></video>
<br><br>
<button onclick="iniciar()" style="padding:15px 30px;background:purple;color:white;border:none;border-radius:10px;font-size:18px">📷 Iniciar Cámara</button>

<script>
async function iniciar(){
    const stream = await navigator.mediaDevices.getUserMedia({video:true});
    document.getElementById('video').srcObject = stream;
}
</script>
</body>
</html>
