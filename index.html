<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>🎯 Analizador de Tiro Pro</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        
        body{
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
            background:#0a0a0a;
            color:white;
            min-height:100vh;
            overflow-x:hidden;
        }
        
        .app{
            max-width:500px;
            margin:0 auto;
            padding:8px;
        }
        
        .header{
            background:linear-gradient(135deg,#1a1a2e,#16213e);
            padding:12px;
            border-radius:12px;
            text-align:center;
            margin-bottom:8px;
            border:1px solid #333;
        }
        
        .header h1{font-size:1.4em;margin-bottom:2px}
        .header p{font-size:0.8em;color:#888}
        
        .camera-box{
            position:relative;
            background:#000;
            border-radius:12px;
            overflow:hidden;
            margin-bottom:8px;
            aspect-ratio:4/3;
            border:2px solid #333;
        }
        
        video,canvas{
            position:absolute;
            top:0;left:0;
            width:100%;height:100%;
            object-fit:cover;
        }
        
        canvas{z-index:5}
        
        .feedback{
            position:absolute;
            top:10px;
            left:50%;
            transform:translateX(-50%);
            background:rgba(0,0,0,0.9);
            padding:8px 20px;
            border-radius:20px;
            z-index:10;
            font-weight:bold;
            font-size:14px;
            text-align:center;
            border:2px solid #555;
            transition:all 0.3s;
        }
        
        .feedback.excelente{background:rgba(0,255,0,0.3);border-color:#00ff00;box-shadow:0 0 20px rgba(0,255,0,0.5)}
        .feedback.bueno{background:rgba(255,165,0,0.3);border-color:#ffa500;box-shadow:0 0 20px rgba(255,165,0,0.5)}
        .feedback.malo{background:rgba(255,0,0,0.3);border-color:#ff0000;box-shadow:0 0 20px rgba(255,0,0,0.5)}
        
        .controls{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:8px;
            margin-bottom:8px;
        }
        
        button{
            padding:14px;
            border:none;
            border-radius:10px;
            font-size:15px;
            font-weight:bold;
            cursor:pointer;
            transition:all 0.2s;
            color:white;
        }
        
        button:active{transform:scale(0.96)}
        button:disabled{opacity:0.4;transform:none}
        
        .btn-start{background:linear-gradient(135deg,#667eea,#764ba2)}
        .btn-stop{background:linear-gradient(135deg,#f093fb,#f5576c)}
        
        .metrics{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:6px;
            margin-bottom:8px;
        }
        
        .metric{
            background:rgba(255,255,255,0.05);
            padding:10px;
            border-radius:10px;
            text-align:center;
            border:2px solid #333;
            transition:all 0.3s;
        }
        
        .metric.perfect{border-color:#00ff00;background:rgba(0,255,0,0.1);box-shadow:0 0 15px rgba(0,255,0,0.3)}
        .metric.good{border-color:#ffa500;background:rgba(255,165,0,0.1);box-shadow:0 0 15px rgba(255,165,0,0.3)}
        .metric.bad{border-color:#ff0000;background:rgba(255,0,0,0.1);box-shadow:0 0 15px rgba(255,0,0,0.3)}
        
        .metric-label{font-size:0.75em;color:#aaa;margin-bottom:3px}
        .metric-value{font-size:0.85em;font-weight:bold}
        
        .dot{
            width:10px;height:10px;
            border-radius:50%;
            display:inline-block;
            margin-right:5px;
            background:#555;
        }
        
        .dot.green{background:#00ff00;box-shadow:0 0 8px #00ff00}
        .dot.orange{background:#ffa500;box-shadow:0 0 8px #ffa500}
        .dot.red{background:#ff0000;box-shadow:0 0 8px #ff0000}
        
        .tips{
            background:rgba(255,255,255,0.03);
            border:1px solid #333;
            border-radius:10px;
            padding:10px;
            font-size:0.8em;
        }
        
        .tips h3{margin-bottom:8px;font-size:0.9em}
        
        .tip{
            padding:6px 8px;
            margin:3px 0;
            background:rgba(255,255,255,0.03);
            border-radius:6px;
            border-left:3px solid #ffa500;
            font-size:0.78em;
        }
        
        .score{
            text-align:center;
            font-size:1.5em;
            font-weight:bold;
            margin:5px 0;
        }
        
        .score.perfect{color:#00ff00}
        .score.good{color:#ffa500}
        .score.bad{color:#ff0000}
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <h1>🎯 ANALIZADOR DE TIRO PRO</h1>
            <p>Líneas de postura en tiempo real</p>
        </div>
        
        <div class="camera-box">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
            <div class="feedback" id="feedback">🎯 LISTO</div>
        </div>
        
        <div class="score" id="score"></div>
        
        <div class="controls">
            <button class="btn-start" id="btnStart" onclick="startCamera()">📷 INICIAR CÁMARA</button>
            <button class="btn-stop" id="btnStop" onclick="stopAll()" disabled>⏹️ DETENER</button>
        </div>
        
        <div class="metrics">
            <div class="metric" id="metHombros">
                <div class="metric-label">HOMBROS</div>
                <div class="metric-value"><span class="dot" id="dotHombros"></span><span id="valHombros">--</span></div>
            </div>
            <div class="metric" id="metCodos">
                <div class="metric-label">CODOS</div>
                <div class="metric-value"><span class="dot" id="dotCodos"></span><span id="valCodos">--</span></div>
            </div>
            <div class="metric" id="metMuneca">
                <div class="metric-label">MUÑECA</div>
                <div class="metric-value"><span class="dot" id="dotMuneca"></span><span id="valMuneca">--</span></div>
            </div>
            <div class="metric" id="metCore">
                <div class="metric-label">CORE</div>
                <div class="metric-value"><span class="dot" id="dotCore"></span><span id="valCore">--</span></div>
            </div>
        </div>
        
        <div class="tips">
            <h3>💡 CORRECCIONES</h3>
            <div id="tipsList">Inicia la cámara para comenzar el análisis</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>
    
    <script>
        let detector, video, canvas, ctx, stream, running = false;
        
        // Colores para las líneas según calidad
        const VERDE = '#00ff00';
        const NARANJA = '#ffa500';
        const ROJO = '#ff0000';
        const AZUL = '#00bfff';
        
        async function startCamera() {
            video = document.getElementById('video');
            canvas = document.getElementById('canvas');
            ctx = canvas.getContext('2d');
            
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: 'user', 
                        width: {ideal: 640}, 
                        height: {ideal: 480} 
                    }
                });
                video.srcObject = stream;
                
                video.onloadedmetadata = async () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    
                    // Cargar IA
                    document.getElementById('feedback').textContent = '⏳ CARGANDO IA...';
                    const model = poseDetection.SupportedModels.BlazePose;
                    detector = await poseDetection.createDetector(model, {
                        runtime: 'tfjs',
                        modelType: 'lite',
                        enableSmoothing: true
                    });
                    
                    document.getElementById('feedback').textContent = '✅ ANALIZANDO';
                    document.getElementById('feedback').className = 'feedback';
                    document.getElementById('btnStart').disabled = true;
                    document.getElementById('btnStop').disabled = false;
                    
                    running = true;
                    analyzeLoop();
                };
            } catch(e) {
                alert('❌ Error: Permite acceso a la cámara\n\n' + e.message);
            }
        }
        
        function stopAll() {
            running = false;
            if(stream) stream.getTracks().forEach(t => t.stop());
            video.srcObject = null;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            document.getElementById('btnStart').disabled = false;
            document.getElementById('btnStop').disabled = true;
            document.getElementById('feedback').textContent = '🎯 LISTO';
            document.getElementById('feedback').className = 'feedback';
            document.getElementById('score').textContent = '';
            
            resetMetrics();
        }
        
        async function analyzeLoop() {
            if(!running) return;
            
            try {
                const poses = await detector.estimatePoses(video);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                if(poses.length > 0) {
                    const kp = poses[0].keypoints;
                    drawSkeleton(kp);
                    analyzePosture(kp);
                }
            } catch(e) {}
            
            requestAnimationFrame(analyzeLoop);
        }
        
        function drawSkeleton(kp) {
            // Conexiones del cuerpo con colores
            const connections = [
                // Torso - SIEMPRE AZUL
                {from:11, to:12, color:AZUL}, // hombros
                {from:11, to:23, color:AZUL}, // torso izq
                {from:12, to:24, color:AZUL}, // torso der
                {from:23, to:24, color:AZUL}, // cadera
                
                // Brazos - COLOR SEGÚN ÁNGULO
                {from:11, to:13, color:null}, // brazo izq sup
                {from:13, to:15, color:null}, // brazo izq inf
                {from:12, to:14, color:null}, // brazo der sup
                {from:14, to:16, color:null}, // brazo der inf
                
                // Piernas
                {from:23, to:25, color:AZUL},
                {from:25, to:27, color:AZUL},
                {from:24, to:26, color:AZUL},
                {from:26, to:28, color:AZUL},
            ];
            
            // Evaluar calidad de brazos
            const shoulderAlign = kp[11].score>0.5 && kp[12].score>0.5 ? 
                Math.abs(kp[11].y - kp[12].y) : 999;
            const elbowAlign = kp[13].score>0.5 && kp[14].score>0.5 ?
                Math.abs(kp[13].y - kp[14].y) : 999;
            
            let armColor = VERDE;
            if(shoulderAlign > 40 || elbowAlign > 50) armColor = ROJO;
            else if(shoulderAlign > 25 || elbowAlign > 35) armColor = NARANJA;
            
            // Dibujar conexiones
            connections.forEach(conn => {
                const from = kp[conn.from];
                const to = kp[conn.to];
                const color = conn.color || armColor;
                
                if(from.score > 0.5 && to.score > 0.5) {
                    ctx.beginPath();
                    ctx.moveTo(from.x, from.y);
                    ctx.lineTo(to.x, to.y);
                    ctx.strokeStyle = color;
                    ctx.lineWidth = 3;
                    ctx.shadowColor = color;
                    ctx.shadowBlur = 10;
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                }
            });
            
            // Dibujar puntos
            kp.forEach((p, i) => {
                if(p.score > 0.5) {
                    // Color según importancia
                    let color = AZUL;
                    if([11,12,13,14,15,16].includes(i)) {
                        color = armColor;
                    }
                    
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 5, 0, Math.PI*2);
                    ctx.fillStyle = color;
                    ctx.shadowColor = color;
                    ctx.shadowBlur = 15;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    
                    // Borde blanco
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 5, 0, Math.PI*2);
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                }
            });
        }
        
        function analyzePosture(kp) {
            let totalScore = 100;
            let tips = [];
            
            // ANALIZAR HOMBROS
            if(kp[11].score > 0.5 && kp[12].score > 0.5) {
                const dif = Math.abs(kp[11].y - kp[12].y);
                let status, color, dotClass;
                
                if(dif < 15) {
                    status = 'PERFECTO'; color = VERDE; dotClass = 'green';
                } else if(dif < 30) {
                    status = 'REGULAR'; color = NARANJA; dotClass = 'orange';
                    totalScore -= 20; tips.push('Endereza un poco los hombros');
                } else {
                    status = 'CORREGIR'; color = ROJO; dotClass = 'red';
                    totalScore -= 40; tips.push('¡ENDEREZA LOS HOMBROS!');
                }
                
                updateMetric('metHombros','dotHombros','valHombros', status, color, dotClass);
            }
            
            // ANALIZAR CODOS
            if(kp[13].score > 0.5 && kp[14].score > 0.5) {
                const dif = Math.abs(kp[13].y - kp[14].y);
                let status, color, dotClass;
                
                if(dif < 20) {
                    status = 'PERFECTO'; color = VERDE; dotClass = 'green';
                } else if(dif < 40) {
                    status = 'REGULAR'; color = NARANJA; dotClass = 'orange';
                    totalScore -= 15; tips.push('Nivela los codos');
                } else {
                    status = 'CORREGIR'; color = ROJO; dotClass = 'red';
                    totalScore -= 35; tips.push('¡NIVELA LOS CODOS!');
                }
                
                updateMetric('metCodos','dotCodos','valCodos', status, color, dotClass);
            }
            
            // ANALIZAR MUÑECA
            if(kp[14].score > 0.5 && kp[16].score > 0.5) {
                const angle = Math.abs(Math.atan2(
                    kp[16].y - kp[14].y,
                    kp[16].x - kp[14].x
                ) * 180 / Math.PI);
                
                let status, color, dotClass;
                
                if(angle < 30) {
                    status = 'PERFECTO'; color = VERDE; dotClass = 'green';
                } else if(angle < 60) {
                    status = 'REGULAR'; color = NARANJA; dotClass = 'orange';
                    totalScore -= 15; tips.push('Alinea mejor la muñeca');
                } else {
                    status = 'CORREGIR'; color = ROJO; dotClass = 'red';
                    totalScore -= 30; tips.push('¡ALINEA LA MUÑECA!');
                }
                
                updateMetric('metMuneca','dotMuneca','valMuneca', status, color, dotClass);
            }
            
            // ANALIZAR CORE
            if(kp[23].score > 0.5 && kp[24].score > 0.5) {
                const dif = Math.abs(kp[23].y - kp[24].y);
                let status, color, dotClass;
                
                if(dif < 12) {
                    status = 'PERFECTO'; color = VERDE; dotClass = 'green';
                } else if(dif < 25) {
                    status = 'REGULAR'; color = NARANJA; dotClass = 'orange';
                    totalScore -= 15; tips.push('Estabiliza la cadera');
                } else {
                    status = 'CORREGIR'; color = ROJO; dotClass = 'red';
                    totalScore -= 30; tips.push('¡ACTIVA EL CORE!');
                }
                
                updateMetric('metCore','dotCore','valCore', status, color, dotClass);
            }
            
            // PUNTUACIÓN GENERAL
            const scoreEl = document.getElementById('score');
            if(totalScore >= 90) {
                scoreEl.textContent = '🏆 ' + totalScore + '% - EXCELENTE';
                scoreEl.className = 'score perfect';
                document.getElementById('feedback').textContent = '✅ ¡TÉCNICA PERFECTA!';
                document.getElementById('feedback').className = 'feedback excelente';
            } else if(totalScore >= 60) {
                scoreEl.textContent = '👍 ' + totalScore + '% - REGULAR';
                scoreEl.className = 'score good';
                document.getElementById('feedback').textContent = '⚠️ MEJORABLE';
                document.getElementById('feedback').className = 'feedback bueno';
            } else {
                scoreEl.textContent = '🔴 ' + totalScore + '% - CORREGIR';
                scoreEl.className = 'score bad';
                document.getElementById('feedback').textContent = '❌ ¡CORRIGE!';
                document.getElementById('feedback').className = 'feedback malo';
            }
            
            // Mostrar tips
            const tipsList = document.getElementById('tipsList');
            if(tips.length === 0) {
                tipsList.innerHTML = '<div class="tip">🌟 ¡Técnica perfecta! Sigue así</div>';
            } else {
                tipsList.innerHTML = tips.map(t => 
                    `<div class="tip">💡 ${t}</div>`
                ).join('');
            }
            
            // Vibración si está mal
            if(totalScore < 60 && navigator.vibrate) {
                navigator.vibrate([50, 100, 50]);
            }
        }
        
        function updateMetric(metId, dotId, valId, status, color, dotClass) {
            document.getElementById(metId).className = 'metric ' + 
                (status === 'PERFECTO' ? 'perfect' : status === 'REGULAR' ? 'good' : 'bad');
            document.getElementById(dotId).className = 'dot ' + dotClass;
            document.getElementById(valId).textContent = status;
            document.getElementById(valId).style.color = color;
        }
        
        function resetMetrics() {
            ['Hombros','Codos','Muneca','Core'].forEach(m => {
                document.getElementById('met'+m).className = 'metric';
                document.getElementById('dot'+m).className = 'dot';
                document.getElementById('val'+m).textContent = '--';
                document.getElementById('val'+m).style.color = '#aaa';
            });
            document.getElementById('tipsList').innerHTML = 'Análisis detenido';
            document.getElementById('score').textContent = '';
        }
    </script>
</body>
</html>
